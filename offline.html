<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#eef2f6">
  <title>离线 - Lily Todo</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pwa.css">
</head>
<body>
  <div class="offline-page">
    <div class="offline-page__icon">📡</div>
    <h1 class="offline-page__title">当前处于离线状态</h1>
    <p class="offline-page__desc">请检查网络连接后重试<br>Lily Todo 会在恢复联网后自动同步</p>
    <button class="offline-page__retry" onclick="window.location.reload()" type="button">重新加载</button>
  </div>
</body>
</html>
